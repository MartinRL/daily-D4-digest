name: Daily D4 Digest

on:
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 CEST
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Generate daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: dotnet run --project src/DailyD4Digest

      - name: Commit brief
        run: |
          git config user.name "research-bot"
          git config user.email "research-bot@users.noreply.github.com"
          git add content/briefs/
          git diff --cached --quiet || git commit -m "docs: daily D4 digest $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
